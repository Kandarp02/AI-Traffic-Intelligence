services:
  # Node.js Backend Service (Static Mode Only)
  # Note: Python AI backend requires video files and ML processing that exceed Render free tier limits
  - type: web
    name: traffic-node-backend
    runtime: node
    plan: free
    buildCommand: cd backend/node && npm install
    startCommand: cd backend/node && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_API_PORT
        value: 5000
      - key: DEFAULT_MODE
        value: STATIC
      - key: STATIC_CYCLE_TIME
        value: 30
      - key: YELLOW_TIME
        value: 3
      - key: PORT
        value: 5000
